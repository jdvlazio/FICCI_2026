name: Promover a iOS

# Workflow manual: Android validó la build actual → promover a iOS.
# Ejecutar desde GitHub → Actions → "Promover a iOS" → Run workflow.
# Esto actualiza version.json.ios = version.json.android y hace push,
# lo que dispara el canal version.json en los dispositivos iOS en la próxima apertura.

on:
  workflow_dispatch:
    inputs:
      confirmar:
        description: 'Escribe "si" para confirmar que Android validó esta build'
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirmar == 'si'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Leer build actual de Android
        id: build
        run: |
          BUILD=$(node -e "const v=require('./version.json'); console.log(v.android);")
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "Promoviendo build $BUILD a iOS"

      - name: Actualizar version.json.ios
        run: |
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('version.json', 'utf8'));
            if (v.android === v.ios) {
              console.log('iOS ya está en la misma build que Android. No hay nada que promover.');
              process.exit(0);
            }
            console.log('Android:', v.android, '→ iOS:', v.android, '(era', v.ios + ')');
            v.ios = v.android;
            fs.writeFileSync('version.json', JSON.stringify(v, null, 2) + '\n');
          "

      - name: Commit y push
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add version.json
          # Si no hay cambios (ya estaba igual), commit no-op
          git diff --cached --quiet || git commit -m "chore(deploy): promover build ${{ steps.build.outputs.build }} a iOS"
          git push
