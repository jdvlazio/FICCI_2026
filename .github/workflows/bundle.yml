name: Create bundle for Capgo updater

on:
  push:
    branches: [main]

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get build number
        id: build
        run: echo "number=$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - name: Create www folder with latest index.html
        run: |
          mkdir -p www
          cp index.html www/
          cp -r assets www/ 2>/dev/null || true
          cp manifest.json www/ 2>/dev/null || true
          cp sw.js www/ 2>/dev/null || true
          cp version.json www/ 2>/dev/null || true
          cp -r festivals www/ 2>/dev/null || true
          cp -r i18n www/ 2>/dev/null || true

      - name: Create bundle zip
        run: |
          cd www
          zip -r ../bundle.zip .
          cd ..
          echo "Bundle size: $(du -sh bundle.zip)"

      - name: Update update.json
        run: |
          echo "{\"version\":\"${{ steps.build.outputs.number }}\",\"url\":\"https://github.com/jdvlazio/Otrofestiv.app/releases/download/v${{ steps.build.outputs.number }}/bundle.zip\"}" > update.json
          cat update.json

      - name: Commit update.json
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add update.json
          git diff --staged --quiet || git commit -m "chore: update bundle version to ${{ steps.build.outputs.number }}"
          git push

      - name: Create GitHub Release with bundle
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.build.outputs.number }}
          name: Bundle ${{ steps.build.outputs.number }}
          files: bundle.zip
          body: "Automatic bundle — built from commit ${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
