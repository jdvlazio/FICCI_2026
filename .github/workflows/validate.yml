name: Validate App

on:
  push:
    paths:
      - 'index.html'
      - 'validate.py'
      - 'festivals/**.json'
  pull_request:
    paths:
      - 'index.html'
      - 'validate.py'
      - 'festivals/**.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: App validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run validate.py
        run: python3 validate.py

      - name: Report on failure
        if: failure()
        run: |
          echo "::error::validate.py failed. Run 'python3 validate.py' locally to see details."
