name: Validate Festivals

on:
  push:
    paths:
      - 'festivals/**.json'
      - 'scripts/validate-festivals.js'
  pull_request:
    paths:
      - 'festivals/**.json'
      - 'scripts/validate-festivals.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Festival JSON validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run validation
        run: node scripts/validate-festivals.js

      - name: Report
        if: failure()
        run: |
          echo "::error::Festival JSON validation failed."
          echo "Run 'node scripts/validate-festivals.js' locally to see details."
