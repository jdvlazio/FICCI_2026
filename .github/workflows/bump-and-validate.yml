name: Bump version y validar

on:
  push:
    paths:
      - 'index.html'
      - 'sw.js'
      - 'version.json'
      - 'validate.py'
      - 'festivals/**.json'

permissions:
  contents: write   # necesario para que el bot pueda pushear el bump commit

jobs:
  bump-and-validate:
    runs-on: ubuntu-latest
    name: Bump version y validar app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump version (android)
        id: bump
        run: |
          node scripts/bump-version.js
          if git diff --quiet sw.js index.html version.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            BUILD_VAL=$(node -e 'console.log(require("./version.json").android)')
            echo "build=$BUILD_VAL" >> $GITHUB_OUTPUT
          fi

      - name: Commit bump
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add sw.js index.html version.json CLAUDE.md
          git commit -m "chore(version): auto-bump ${{ steps.bump.outputs.build }}"
          git push

      - name: Validar app
        run: python3 validate.py
