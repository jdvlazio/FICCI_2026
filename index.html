<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FICCI 65 — Programación</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1018;--surf:#181c28;--card:#1d2133;--bdr:#282f45;
  --gold:#f5c518;--teal:#30c9a8;--violet:#a855f7;
  --text:#dde2f0;--muted:#6b7490;--white:#fff;--r:11px;
}
html{-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;
  background-image:
    radial-gradient(ellipse 60% 40% at 15% 0%,rgba(245,197,24,.07) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 100%,rgba(255,90,60,.05) 0%,transparent 60%);
  min-height:100vh}

.hdr{padding:20px 16px 0}
.hdr-tag{display:inline-block;background:var(--gold);color:#0e1018;
  font-family:"Bebas Neue",sans-serif;font-size:10px;letter-spacing:2.5px;
  padding:3px 9px;border-radius:3px;margin-bottom:5px}
.hdr-main{font-family:"Bebas Neue",sans-serif;font-size:clamp(36px,8vw,58px);
  line-height:.92;color:var(--white)}
.hdr-main em{color:var(--gold);font-style:normal}
.hdr-sub{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px}

.legend{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px 0}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);
  background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:3px 8px}
.leg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.day-tabs{display:flex;overflow-x:auto;gap:2px;padding:12px 16px 0;
  scrollbar-width:none;border-bottom:1px solid var(--bdr);margin-top:6px;
  -webkit-overflow-scrolling:touch}
.day-tabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;
  margin-bottom:-1px;padding:8px 12px 10px;cursor:pointer;color:var(--muted);
  font-family:"DM Sans",sans-serif;transition:color .15s;text-align:center;min-width:62px}
.dtab-name{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:.5px;display:block;line-height:1}
.dtab-date{font-size:10px;display:block;margin-top:1px}
.dtab-cnt{font-size:9px;background:var(--bdr);border-radius:10px;padding:1px 6px;margin-top:3px;display:inline-block}
.dtab:hover{color:var(--text)}
.dtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.dtab.on .dtab-cnt{background:var(--gold);color:#0e1018;font-weight:600}

.fbar-wrap{overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bdr);-webkit-overflow-scrolling:touch}
.fbar-wrap::-webkit-scrollbar{display:none}
.fbar{display:flex;gap:6px;padding:8px 16px;width:max-content;min-width:100%;align-items:center}
.fbar-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;
  white-space:nowrap;flex-shrink:0;min-width:52px}
.fbtn{padding:4px 11px;border-radius:20px;border:1px solid var(--bdr);
  background:none;color:var(--muted);font-size:11px;cursor:pointer;
  font-family:"DM Sans",sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;min-height:30px}
.fbtn:active{opacity:.7}
.fbtn.sede.on{border-color:var(--teal);color:var(--teal);background:rgba(48,201,168,.08)}
.fbtn.sec.on{border-color:var(--violet);color:var(--violet);background:rgba(168,85,247,.08)}

.hint{padding:6px 16px;font-size:10.5px;color:var(--muted);min-height:28px}
.hint.active{color:var(--gold)}
.cnt-line{padding:2px 16px 4px;font-size:11px;color:var(--muted)}
.cnt-line b{color:var(--text)}

.grid{padding:8px 12px 60px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:8px}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);
  overflow:hidden;display:flex;flex-direction:column;position:relative;
  cursor:pointer;transition:opacity .2s,border-color .2s,box-shadow .2s}
@media(hover:hover){
  .card:not(.conflict):hover{transform:translateY(-2px);
    box-shadow:0 8px 28px rgba(0,0,0,.4);border-color:rgba(245,197,24,.25)}
}
.card:active{opacity:.85}
.card.program{background:#151820;border-color:#1e2438;border-left:3px solid var(--teal)}
@media(hover:hover){
  .card.program:not(.conflict):hover{border-color:var(--teal);
    box-shadow:0 8px 28px rgba(48,201,168,.15)}
}
.card.selected{border-color:var(--gold) !important;
  box-shadow:0 0 0 2px var(--gold),0 8px 28px rgba(245,197,24,.2) !important}
.card.conflict{opacity:.28;filter:grayscale(.6);cursor:default;pointer-events:none}
.card.conflict::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(-45deg,transparent,transparent 6px,
    rgba(0,0,0,.18) 6px,rgba(0,0,0,.18) 7px);
  border-radius:var(--r);pointer-events:none}
.card.apertura{border-color:rgba(245,197,24,.5);box-shadow:0 0 20px rgba(245,197,24,.1)}

.c-stripe{height:3px;flex-shrink:0}
.c-body{padding:11px 12px 9px;display:flex;flex-direction:column;gap:8px;flex:1}
.c-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.c-time{display:flex;align-items:baseline;gap:1px;flex-shrink:0}
.c-time-ico{font-size:12px;margin-right:1px}
.c-time-val{font-family:"Bebas Neue",sans-serif;
  font-size:clamp(34px,9vw,42px);line-height:1;color:var(--gold);letter-spacing:2px}
.c-venue{text-align:right;flex:1;min-width:0}
.c-venue-name{font-size:11.5px;font-weight:600;color:var(--white);line-height:1.3;word-break:break-word}
.c-venue-ico{margin-right:2px}
.c-venue-sub{font-size:10px;color:var(--muted);margin-top:1px}
.c-film{display:flex;flex-direction:column;gap:3px}
.c-flags{font-size:18px;line-height:1;letter-spacing:1px}
.c-title{font-size:13px;font-weight:600;color:var(--white);line-height:1.35}
.c-title-en{font-size:10.5px;color:var(--muted);font-style:italic;line-height:1.35;margin-top:1px}
.card.program .c-title-en{color:#4a5578;font-size:10px}

.c-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;
  padding:6px 12px;border-top:1px solid var(--bdr);background:rgba(0,0,0,.18)}
.c-left{display:flex;align-items:center;gap:5px;min-width:0;flex:1;overflow:hidden}
.c-sec{font-size:9px;padding:2px 7px;border-radius:20px;
  background:var(--surf);border:1px solid var(--bdr);color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:145px;
  cursor:pointer;transition:border-color .15s,color .15s;flex-shrink:0}
.c-sec:hover{border-color:var(--violet);color:var(--violet)}
.c-sec.active-sec{border-color:var(--violet);color:var(--violet);background:rgba(168,85,247,.08)}
.c-lb{display:inline-flex;align-items:center;gap:4px;
  background:#2C3440;border:1px solid #3a4455;border-radius:20px;
  padding:2px 7px 2px 4px;text-decoration:none;flex-shrink:0;
  transition:background .15s,transform .15s;line-height:1}
.c-lb:hover{background:#3a4455;transform:scale(1.04)}
.c-lb:active{opacity:.7}
.c-lb-text{font-size:9.5px;font-weight:600;color:#e8e8e8;letter-spacing:.2px;white-space:nowrap}
.c-dur{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0}

.night{position:absolute;top:6px;right:8px;font-size:12px;opacity:.7;pointer-events:none}
.apertura-badge{position:absolute;top:6px;right:8px;font-size:9px;
  background:var(--gold);color:#0e1018;font-weight:700;letter-spacing:1px;
  padding:2px 6px;border-radius:8px;font-family:"Bebas Neue",sans-serif}
.prog-badge{position:absolute;top:6px;right:8px;font-size:9px;
  color:var(--teal);letter-spacing:.5px;font-weight:600}

.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.empty span{font-size:44px;display:block;margin-bottom:10px}
</style>
</head>

function renderVbar(){
  const bar=document.getElementById('vbar');
  bar.querySelectorAll('.fbtn').forEach(b=>b.remove());
  const vs=[...new Set(FILMS.filter(f=>f.day===activeDay).map(f=>vcfg(f.venue).short))];
  addFbtn(bar,'Todas','all','sede',activeVenue,()=>{activeVenue='all';selectedIdx=null;setHint(null);render();});
  vs.forEach(vk=>{
    const cfg=Object.values(VCFG).find(c=>c.short===vk)||VCFG['Teatro Adolfo Mejía'];
    addFbtn(bar,`${cfg.ico} ${vk}`,vk,'sede',activeVenue,()=>{activeVenue=vk;selectedIdx=null;setHint(null);render();});
  });
}

function renderSbar(){
  const bar=document.getElementById('sbar');
  bar.querySelectorAll('.fbtn').forEach(b=>b.remove());
  let dayF=FILMS.filter(f=>f.day===activeDay);
  if(activeVenue!=='all') dayF=dayF.filter(f=>vcfg(f.venue).short===activeVenue);
  const secs=[...new Set(dayF.map(f=>f.section))].sort();
  addFbtn(bar,'Todas','all','sec',activeSec,()=>{activeSec='all';selectedIdx=null;setHint(null);render();});
  secs.forEach(sec=>{
    addFbtn(bar,sec,sec,'sec',activeSec,()=>{
      activeSec=(activeSec===sec?'all':sec);selectedIdx=null;setHint(null);render();
    });
  });
}

function setHint(film){
  const el=document.getElementById('hint');
  if(!film){el.textContent='Toca una película para ver qué otras se solapan';el.classList.remove('active');return;}
  const end=toMin(film.time)+parseDur(film.duration)+10;
  el.textContent=`⏱ Bloque ocupado: ${minToStr(toMin(film.time)-10)} – ${minToStr(end)} · Toca de nuevo para deseleccionar`;
  el.classList.add('active');
}

function onCardClick(idx,vis){
  if(selectedIdx===idx){selectedIdx=null;setHint(null);}
  else{selectedIdx=idx;setHint(vis[idx]);}
  applyStates(vis);
}

function applyStates(vis){
  document.querySelectorAll('.card').forEach((card,i)=>{
    card.classList.remove('selected','conflict');card.style.pointerEvents='';
    if(selectedIdx===null) return;
    if(i===selectedIdx){card.classList.add('selected');}
    else{
      const fStart=toMin(vis[i].time);
      const sel=vis[selectedIdx];
      const s=toMin(sel.time)-10,e=toMin(sel.time)+parseDur(sel.duration)+10;
      if(fStart>s&&fStart<e) card.classList.add('conflict');
    }
  });
}

function render(){
  renderVbar();renderSbar();
  let films=FILMS.filter(f=>f.day===activeDay);
  if(activeVenue!=='all') films=films.filter(f=>vcfg(f.venue).short===activeVenue);
  if(activeSec!=='all')   films=films.filter(f=>f.section===activeSec);
  document.getElementById('cnt').innerHTML=`<b>${films.length}</b> función${films.length!==1?'es':''}`;
  const grid=document.getElementById('grid');
  if(!films.length){grid.innerHTML='<div class="empty"><span>🎞️</span>Sin funciones para este filtro.</div>';return;}
  grid.innerHTML=films.map((f,i)=>{
    const vc=vcfg(f.venue),sl=sala(f.venue);
    const night=parseInt(f.time)>=20;
    const isAp=f.section==='🎬 Apertura';
    const isProg=f.is_cortos;
    const flags=f.flags||'🎬';
    const tEn=f.title_en&&f.title_en!==f.title?f.title_en:'';
    const lb=lbUrl(f.title,f.title_en);
    const lbPill=isProg?'':`<a class="c-lb" href="${lb}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${LB_SVG}<span class="c-lb-text">Letterboxd</span></a>`;
    const badge=isAp?'<div class="apertura-badge">✦ APERTURA</div>':isProg?'<div class="prog-badge">● PROGRAMA</div>':night?'<div class="night">🌙</div>':'';
    const secActive=activeSec===f.section?' active-sec':'';
    return `<div class="card${isAp?' apertura':isProg?' program':''}" data-idx="${i}">
      <div class="c-stripe" style="background:${isProg?'#30c9a8':vc.col}"></div>
      ${badge}
      <div class="c-body">
        <div class="c-top">
          <div class="c-time"><span class="c-time-ico">⏰</span><span class="c-time-val">${f.time}</span></div>
          <div class="c-venue">
            <div class="c-venue-name"><span class="c-venue-ico">${vc.ico}</span>${vc.short}</div>
            ${sl?`<div class="c-venue-sub">${sl}</div>`:''}
          </div>
        </div>
        <div class="c-film">
          <div class="c-flags">${flags}</div>
          <div class="c-title">${f.title}</div>
          ${tEn?`<div class="c-title-en">${tEn}</div>`:''}
        </div>
      </div>
      <div class="c-foot">
        <div class="c-left">
          ${lbPill}
          <span class="c-sec${secActive}" data-sec="${f.section.replace(/"/g,'&quot;')}">${f.section}</span>
        </div>
        <span class="c-dur">🕐 ${f.duration}</span>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.classList.contains('c-sec')){
        e.stopPropagation();
        const sec=e.target.dataset.sec;
        activeSec=(activeSec===sec?'all':sec);
        selectedIdx=null;setHint(null);render();return;
      }
      onCardClick(parseInt(card.dataset.idx),films);
    });
  });
  if(selectedIdx!==null&&selectedIdx<films.length) applyStates(films);
}
render();
</script>
</body>
</html>
